<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简搜索导航 | Search Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #6366f1;
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans SC', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #020617;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.6;
            font-weight: 300;
        }

        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1.5rem;
            max-width: 1000px;
            width: 100%;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-card {
            text-decoration: none;
            color: var(--text);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .search-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--accent);
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.3);
        }

        .icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
        }

        .name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .domain {
            font-size: 0.75rem;
            opacity: 0.4;
        }

        footer {
            margin-top: 4rem;
            opacity: 0.4;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .search-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>搜索中心</h1>
        <p>让搜索变得更简单，更高效</p>
    </div>

    <div class="search-grid">
        <a href="https://www.baidu.com" target="_blank" class="search-card">
            <span class="icon">🔵</span>
            <span class="name">百度</span>
            <span class="domain">baidu.com</span>
        </a>
        <a href="https://www.bing.com" target="_blank" class="search-card">
            <span class="icon">💠</span>
            <span class="name">必应</span>
            <span class="domain">bing.com</span>
        </a>
        <a href="https://www.google.com" target="_blank" class="search-card">
            <span class="icon">🌈</span>
            <span class="name">Google</span>
            <span class="domain">google.com</span>
        </a>
        <a href="https://duckduckgo.com" target="_blank" class="search-card">
            <span class="icon">🦆</span>
            <span class="name">DuckDuckGo</span>
            <span class="domain">duckduckgo.com</span>
        </a>
        <a href="https://github.com/search" target="_blank" class="search-card">
            <span class="icon">🐈‍⬛</span>
            <span class="name">GitHub</span>
            <span class="domain">github.com</span>
        </a>
        <a href="https://fanyi.baidu.com" target="_blank" class="search-card">
            <span class="icon">🔤</span>
            <span class="name">百度翻译</span>
            <span class="domain">fanyi.baidu.com</span>
        </a>
    </div>

    <footer>
        DEPROYED TO GITHUB &bull; 2026
    </footer>

</body>
</html>
